            },
            {

            price: "$15"
            },
            {

            price: "$24"
            },
            {

            desc:  "Mixed grilled meats served with traditional sides like yucca or potatoes",
            price: "$13.5"
            },
            {

            price: "$14"

        ]

    /* ---------- BURGERS & SPECIALS ---------- */
    {
        label: "Fast Food & Specials",
        items: [
            {
            name:  "American Burger",
            desc:  "Classic beef patty with cheese, lettuce, tomato, onions, and pickles",
            price: "$6"
            },
            {
            name:  "Club House Sandwich",
            desc:  "Triple-decker sandwich with chicken, ham, cheese, bacon, egg, and fries",
            price: "$11"
            },
            {
            name:  "Full Special Pepito",
            desc:  "20cm Venezuelan-style sandwich filled with chopped steak, veggies, and house sauces",
            price: "$15"
            }
        ]
        },

        /* ---------- DESSERTS ---------- */
    {
        label: "Desserts",
        items: [
            {
                name: "Tres Leches Cake",
                desc: "Traditional sponge cake soaked in three types of milk, topped with a light meringue and a touch of cinnamon",
                price: "$7"
            },
            {
                name: "Rice Pudding",
                desc: "Creamy rice cooked with whole milk, cinnamon sticks, and a hint of lemon zest",
                price: "$6"

                desc: "Rich and creamy cheesecake with a buttery graham cracker crust and a bright blueberry glaze",
                price: "$8.5"
            }
        ]
    },

        /* ---------- DRINKS & BEVERAGES ---------- */
    {
        label: "Drinks",
        items: [
            {
                name: "Fresh Fruit Smoothies",
                desc: "Choice of strawberry, cantaloupe, pineapple, papaya, or passion fruit blended to perfection",
                price: "$3"
            },
            {
                name: "Frozen Lemonade",

                price: "$2.5"
            },
            {
                name: "Bottled Soda (Can)",
                desc: "Your choice of chilled canned carbonated soft drinks",
                price: "$1.5"
            },
            {
                name: "Large Bottled Soda",
                desc: "Family size soft drinks available in 1L, 1.5L, or 2L options",
                price: "$2 - $3"
            },
            {
                name: "Small Soda (Bomba)",
                desc: "Quick refreshing glass of your favorite soft drink",
                price: "$1"
            },
            {
                name: "Mineral Water",
                desc: "Purified bottled water (600 ml) to keep you hydrated",
                price: "$1.5"
            }
        ]
    }

    ];

    /* =============================================================
       DISPLAY LOGIC
    ============================================================= */

    let activeIdx = 0;

    const nav = document.getElementById('navTabs');
    MENU.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => {
        activeIdx = i;
        document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
        document.querySelectorAll('.section').forEach((s, j) => s.classList.toggle('active', j === i));
    };
    nav.appendChild(btn);
    });

    const main = document.getElementById('mainContent');
    MENU.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'section' + (i === 0 ? ' active' : '');

    div.innerHTML = `
        <h2 class="section-title">${sec.label}</h2>
        <div class="divider"></div>
        <div class="menu-grid">
        ${sec.items.map(item => `
            <div class="menu-card">
            <div>
                <div class="item-name">${item.name}</div>
                <div class="item-desc">${item.desc}</div>
            </div>
            <div class="item-price">${item.price}</div>
            </div>
        `).join('')}
        </div>
    `;
    main.appendChild(div);
    });

</script>
</body>
</html>
