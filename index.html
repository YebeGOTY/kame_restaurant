<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú del Restaurante</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --white: #ffffff;
      --ink: #1a1a18;
      --muted: #7a7a72;
      --accent: #c8762a;
      --accent-light: #f5ede0;
      --border: #e8e4de;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 48px 24px 36px;
      text-align: center;
      position: relative;
    }
    .restaurant-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      letter-spacing: -0.5px;
      color: var(--ink);
      cursor: pointer;
      display: inline-block;
    }
    .restaurant-name:focus-visible { outline: 2px solid var(--accent); border-radius: 4px; }
    .restaurant-name[contenteditable="true"] {
      background: var(--accent-light);
      border-radius: 6px;
      padding: 0 8px;
      outline: 2px solid var(--accent);
    }
    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      margin-top: 6px;
      cursor: pointer;
      display: inline-block;
    }
    .tagline[contenteditable="true"] {
      background: var(--accent-light);
      border-radius: 4px;
      padding: 0 6px;
      outline: 2px solid var(--accent);
    }
    .edit-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* ── NAV TABS ── */
    nav {
      display: flex;
      justify-content: center;
      gap: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      padding: 16px 28px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── MAIN CONTENT ── */
    main { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--ink);
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-add:hover { background: #b3621f; }
    .btn-add:active { transform: scale(0.97); }

    /* ── MENU ITEMS ── */
    .menu-grid {
      display: grid;
      gap: 16px;
    }
    .menu-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      align-items: start;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
      position: relative;
    }
    .menu-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

    .card-left { grid-column: 1; }
    .card-right { grid-column: 2; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

    .item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      min-width: 40px;
      border-radius: 4px;
    }
    .item-name[contenteditable="true"] {
      background: var(--accent-light);
      padding: 0 4px;
      outline: 2px solid var(--accent);
    }
    .item-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 5px;
      cursor: pointer;
      border-radius: 4px;
    }
    .item-desc[contenteditable="true"] {
      background: var(--accent-light);
      padding: 0 4px;
      outline: 2px solid var(--accent);
    }
    .item-price {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
    }
    .item-price[contenteditable="true"] {
      background: var(--accent-light);
      padding: 0 4px;
      outline: 2px solid var(--accent);
    }
    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 30px; height: 30px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .btn-delete:hover { background: #ffeaea; color: #c0392b; border-color: #c0392b; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ── DIVIDER ── */
    .divider {
      width: 48px; height: 2px;
      background: var(--accent);
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: var(--border);
      letter-spacing: 0.4px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,24,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 36px 32px;
      width: min(480px, 92vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: translateY(16px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: var(--ink);
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--bg);
      transition: border-color 0.15s;
      outline: none;
      resize: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 22px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      color: var(--muted); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 10px 26px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #b3621f; }

    @media (max-width: 560px) {
      .menu-card { grid-template-columns: 1fr; }
      .card-right { flex-direction: row; align-items: center; justify-content: space-between; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="restaurant-name" id="restaurantName" contenteditable="false" title="Haz clic para editar">
      Kamehouse Restaurant
    </div>
  </div>
  <div>
    <div class="tagline" id="tagline" contenteditable="false" title="Haz clic para editar">
      flavors of our land
    </div>
  </div>
</header>

<!-- TABS -->
<nav id="navTabs"></nav>

<!-- SECTIONS -->
<main id="mainContent"></main>

<footer>

</footer>

<!-- MODAL AGREGAR PLATO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">add plate</h3>
    <div class="field">
      <label>name of the dish</label>
      <input type="text" id="inputName" placeholder="Ej: Bandeja Paisa" maxlength="80"/>
    </div>
    <div class="field">
      <label>ingredients / description</label>
      <textarea id="inputDesc" rows="3" placeholder="Ej: Frijoles, arroz, carne molida, chicharrón, aguacate..."></textarea>
    </div>
    <div class="field">
      <label>price</label>
      <input type="text" id="inputPrice" placeholder="Ej: $15.000" maxlength="20"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save" id="btnSave">Save</button>
    </div>
  </div>
</div>

<script>
  // ── DATA ──────────────────────────────────────────────────────────────
  const SECTIONS = [
    { id: 'principales', label: 'Platos Principales' },
    { id: 'postres',     label: 'Postres' },
    { id: 'bebidas',     label: 'Bebidas' },
  ];

  const defaultItems = {
    principales: [
      { id: uid(), name: 'Bandeja Paisa', desc: 'Frijoles rojos, arroz blanco, carne molida, chicharrón, chorizo, huevo frito, aguacate y arepa', price: '$18.000' },
      { id: uid(), name: 'Sancocho de Gallina', desc: 'Caldo tradicional con gallina criolla, yuca, plátano verde, mazorca y cilantro', price: '$15.000' },
      { id: uid(), name: 'Arroz con Pollo', desc: 'Arroz al azafrán con pollo desmechado, zanahoria, arvejas y pimentón', price: '$14.000' },
    ],
    postres: [
      { id: uid(), name: 'Arroz con Leche', desc: 'Arroz cocido en leche entera con canela, panela y ralladura de limón', price: '$6.000' },
      { id: uid(), name: 'Tres Leches', desc: 'Bizcocho esponjoso bañado en tres tipos de leche, cubierto de crema chantilly', price: '$7.000' },
    ],
    bebidas: [
      { id: uid(), name: 'Limonada de Coco', desc: 'Limonada natural mezclada con leche de coco y hielo frappé', price: '$5.000' },
      { id: uid(), name: 'Agua de Panela', desc: 'Bebida caliente tradicional de caña de azúcar con limón', price: '$3.000' },
      { id: uid(), name: 'Jugo Natural', desc: 'Jugo del día preparado con fruta fresca de temporada', price: '$4.500' },
    ],
  };

  let menuData = JSON.parse(localStorage.getItem('menuData')) || defaultItems;
  let activeSection = SECTIONS[0].id;
  let currentSection = null;

  function uid() { return '_' + Math.random().toString(36).slice(2,9); }
  function save() { localStorage.setItem('menuData', JSON.stringify(menuData)); }

  // ── BUILD UI ──────────────────────────────────────────────────────────
  function buildTabs() {
    const nav = document.getElementById('navTabs');
    nav.innerHTML = '';
    SECTIONS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (s.id === activeSection ? ' active' : '');
      btn.textContent = s.label;
      btn.onclick = () => switchTab(s.id);
      nav.appendChild(btn);
    });
  }

  function buildSections() {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';
    SECTIONS.forEach(s => {
      const sec = document.createElement('div');
      sec.className = 'section' + (s.id === activeSection ? ' active' : '');
      sec.id = 'sec-' + s.id;

      sec.innerHTML = `
        <div class="section-header">
          <h2 class="section-title">${s.label}</h2>
          <button class="btn-add" data-sec="${s.id}">
            <span>+</span> Agregar plato
          </button>
        </div>
        <div class="divider"></div>
        <div class="menu-grid" id="grid-${s.id}"></div>
      `;
      main.appendChild(sec);
      sec.querySelector('.btn-add').onclick = () => openModal(s.id);
      renderGrid(s.id);
    });
  }

  function renderGrid(secId) {
    const grid = document.getElementById('grid-' + secId);
    const items = menuData[secId] || [];
    if (items.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">🍽️</div>
          <p>No hay platos aún. ¡Agrega el primero!</p>
        </div>`;
      return;
    }
    grid.innerHTML = '';
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'menu-card';
      card.innerHTML = `
        <div class="card-left">
          <div class="item-name" contenteditable="false" data-field="name" data-id="${item.id}" data-sec="${secId}">${item.name}</div>
          <div class="item-desc" contenteditable="false" data-field="desc" data-id="${item.id}" data-sec="${secId}">${item.desc}</div>
        </div>
        <div class="card-right">
          <div class="item-price" contenteditable="false" data-field="price" data-id="${item.id}" data-sec="${secId}">${item.price}</div>
          <button class="btn-delete" title="Eliminar" data-id="${item.id}" data-sec="${secId}">✕</button>
        </div>
      `;
      grid.appendChild(card);

      // Inline edit
      card.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('click', () => {
          el.contentEditable = 'true';
          el.focus();
          // place cursor at end
          const range = document.createRange();
          range.selectNodeContents(el);
          range.collapse(false);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
        });
        el.addEventListener('blur', () => {
          el.contentEditable = 'false';
          const { id, sec, field } = el.dataset;
          const idx = menuData[sec].findIndex(i => i.id === id);
          if (idx !== -1) {
            menuData[sec][idx][field] = el.textContent.trim() || el.textContent;
            save();
          }
        });
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
          if (e.key === 'Escape') { el.blur(); }
        });
      });

      // Delete
      card.querySelector('.btn-delete').onclick = (e) => {
        const { id, sec } = e.currentTarget.dataset;
        if (confirm('¿Eliminar este plato?')) {
          menuData[sec] = menuData[sec].filter(i => i.id !== id);
          save();
          renderGrid(sec);
        }
      };
    });
  }

  function switchTab(secId) {
    activeSection = secId;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', SECTIONS[i].id === secId);
    });
    document.querySelectorAll('.section').forEach(sec => {
      sec.classList.toggle('active', sec.id === 'sec-' + secId);
    });
  }

  // ── MODAL ─────────────────────────────────────────────────────────────
  function openModal(secId) {
    currentSection = secId;
    document.getElementById('inputName').value = '';
    document.getElementById('inputDesc').value = '';
    document.getElementById('inputPrice').value = '';
    document.getElementById('modalTitle').textContent = 'Agregar plato';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inputName').focus();
  }

  document.getElementById('btnCancel').onclick = closeModal;
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    currentSection = null;
  }

  document.getElementById('btnSave').onclick = () => {
    const name  = document.getElementById('inputName').value.trim();
    const desc  = document.getElementById('inputDesc').value.trim();
    const price = document.getElementById('inputPrice').value.trim();
    if (!name) { document.getElementById('inputName').focus(); return; }
    if (!menuData[currentSection]) menuData[currentSection] = [];
    menuData[currentSection].push({ id: uid(), name, desc: desc || 'Sin descripción', price: price || '—' });
    save();
    renderGrid(currentSection);
    closeModal();
  };

  // Save on Enter in modal inputs
  ['inputName','inputDesc','inputPrice'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('btnSave').click(); }
    });
  });

  // ── EDITABLE HEADER ───────────────────────────────────────────────────
  ['restaurantName','tagline'].forEach(id => {
    const el = document.getElementById(id);
    const key = 'header_' + id;
    const saved = localStorage.getItem(key);
    if (saved) el.textContent = saved;

    el.addEventListener('click', () => {
      el.contentEditable = 'true';
      el.focus();
      const r = document.createRange();
      r.selectNodeContents(el);
      r.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
    });
    el.addEventListener('blur', () => {
      el.contentEditable = 'false';
      localStorage.setItem(key, el.textContent.trim());
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
  });

  // ── INIT ──────────────────────────────────────────────────────────────
  buildTabs();
  buildSections();
</script>
</body>
</html>
