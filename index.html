<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Arcane Restaurant Menu</title>
    <link rel="shortcut icon" href="icon.jfif" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="restaurant-name">Arcane Restaurant</div>
  <div class="tagline">A taste of our heritage</div>
</header>

<nav id="navTabs"></nav>
<main id="mainContent"></main>

<footer>Digital Menu</footer>

<script>

  /* =============================================================
     ✏️  EDIT YOUR MENU HERE
     ============================================================= */

    const MENU = [
        /* ---------- MAIN DISHES ---------- */
        {
        label: "main dishes",
        items: [
            {
            name:  "Beef Lomito with Mushrooms",
            desc:  "Tender beef tenderloin medallions smothered in a rich, creamy fresh mushroom sauce",
            price: "$17.50"
            },
            {
            name:  "Grilled Solomo Churrasco",
            desc:  "Premium sirloin steak grilled to perfection, seasoned with sea salt and herbs",
            price: "$19.99"
            },
            {
            name:  "Chicken Parmigiana",
            desc:  "Breaded chicken breast topped with artisanal tomato sauce and melted Parmesan cheese",
            price: "$14.99"
            },
            {
            name:  "Chicken Cordon Bleu",
            desc:  "Chicken breast stuffed with ham and cheese, breaded and fried until golden and crispy",
            price: "$14.99"
            },
            {
            name:  "Surf & Turf Grill",
            desc:  "A powerful combination of grilled beef cuts paired with fresh sautéed shrimp",
            price: "$23.99"
            },
            {
            name:  "Street Style Grill",
            desc:  "Mixed grilled meats served with traditional sides like yucca or potatoes",
            price: "$13.50"
            },
            {
            name:  "Classic Carbonara",
            desc:  "Traditional recipe with egg, cured cheese, and crispy bacon bits",
            price: "$8.00"
            },
            {
            name:  "Beef Lasagna",
            desc:  "Layers of pasta with savory Bolognese sauce, béchamel, and melted cheese",
            price: "$13.00"
            },
            {
            name:  "Linguine in White Cream with Shrimp",
            desc:  "Long pasta tossed in a smooth white cream sauce with sautéed garlic shrimp",
            price: "$14.00"
            },
        ]
        },

    /* ---------- BURGERS & SPECIALS ---------- */
    {
        label: "Fast Food & Specials",
        items: [
            {
            name:  "American Burger",
            desc:  "Classic beef patty with cheese, lettuce, tomato, onions, and pickles",
            price: "$13.50"
            },
            {
            name:  "Club House Sandwich",
            desc:  "Triple-decker sandwich with chicken, ham, cheese, bacon, egg, and fries",
            price: "$11.00"
            },
            {
            name:  "Full Special Pepito",
            desc:  "20cm Venezuelan-style sandwich filled with chopped steak, veggies, and house sauces",
            price: "$17.00"
            }
        ]
        },

    /* ---------- DRINKS ---------- */
    {
        label: "Drinks",
        items: [
            {
            name:  "Fresh Fruit Shakes",
            desc:  "Your choice of strawberry, melon, pineapple, papaya, or passion fruit",
            price: "$3.00"
            },
            {
            name:  "Frozen Lemonade",
            desc:  "Refreshing frappe-style lemonade made with fresh lime juice",
            price: "$3.00"
            },
            {
            name:  "Iced Tea",
            desc:  "Classic Nestea served chilled with a hint of lemon",
            price: "$2.50"
            }
        ]
        }

    ];

    /* =============================================================
       DISPLAY LOGIC
    ============================================================= */

    let activeIdx = 0;

    const nav = document.getElementById('navTabs');
    MENU.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => {
        activeIdx = i;
        document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
        document.querySelectorAll('.section').forEach((s, j) => s.classList.toggle('active', j === i));
    };
    nav.appendChild(btn);
    });

    const main = document.getElementById('mainContent');
    MENU.forEach((sec, i) => {
    const div = document.createElement('div');
    div.className = 'section' + (i === 0 ? ' active' : '');

    div.innerHTML = `
        <h2 class="section-title">${sec.label}</h2>
        <div class="divider"></div>
        <div class="menu-grid">
        ${sec.items.map(item => `
            <div class="menu-card">
            <div>
                <div class="item-name">${item.name}</div>
                <div class="item-desc">${item.desc}</div>
            </div>
            <div class="item-price">${item.price}</div>
            </div>
        `).join('')}
        </div>
    `;
    main.appendChild(div);
    });

</script>
</body>
</html>
